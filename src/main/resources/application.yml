server:
  port: 8080

spring:
  application:
    name: movierec-gateway
  
  # MySQL R2DBC Configuration (Reactive non-blocking access)
  r2dbc:
    url: r2dbc:mysql://localhost:3306/movierec_db?serverZoneId=Asia/Shanghai
    username: root
    password: 123456
    pool:
      initial-size: 20
      max-size: 200
      max-idle-time: 30m
      max-life-time: 60m

  # Redis Configuration (Reactive WebFlux support)
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 200
          max-wait: 2000ms
          max-idle: 50
          min-idle: 10
      timeout: 5000ms

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
    consumer:
      group-id: realtime-profiler
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: java.lang.String
        spring.json.trusted.packages: "*"

# Resilience4j Circuit Breaker and TimeLimiter (FastAPI Isolation)
resilience4j.circuitbreaker:
  instances:
    fastApiInference:
      registerHealthIndicator: true
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 3
      waitDurationInOpenState: 5s
      failureRateThreshold: 50

resilience4j.timelimiter:
  instances:
    fastApiInference:
      timeoutDuration: 150ms
      cancelRunningFuture: true

# FastAPI Sidecar URL
movierec:
  inference:
    url: http://localhost:8000
    endpoints:
      predict: /api/predict

logging:
  level:
    root: INFO                # 全局保持 INFO，避免系统日志刷屏
    com.movierec: DEBUG       # 将你自己的业务包设为 DEBUG（最有用）
    org.springframework.web: DEBUG # 查看 Web 请求和响应详情
    io.github.resilience4j: DEBUG  # 实时查看熔断器状态变化（强烈推荐用于性能测试）

