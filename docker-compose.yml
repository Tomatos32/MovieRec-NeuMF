
services:
  # ============================================================
  # Redis 缓存服务 (热门排行榜 / 会话特征 / 语义缓存)
  # ============================================================
  redis:
    image: redis:7.0-alpine
    container_name: movierec-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Zookeeper (Kafka 依赖)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: movierec-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ============================================================
  # Kafka 事件总线 (user-interaction-events Topic)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: movierec-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ============================================================
  # FastAPI 推理边车 (NeuMF Sidecar)
  # 若宿主机装有 NVIDIA Container Toolkit, 则自动利用 GPU 推理
  # 若未安装, 请注释 deploy 段落, 将自动降级为 CPU 推理
  # ============================================================
  inference-sidecar:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: movierec-inference
    command: ["uvicorn", "inference.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    ports:
      - "8000:8000"
    environment:
      - NUM_USERS=${NUM_USERS:-200948}
      - NUM_MOVIES=${NUM_MOVIES:-84432}
      - MODEL_PATH=/app/model/model.pth
    volumes:
      - ./model:/app/model:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # 注意: MySQL 使用宿主机本地安装的实例, 不在容器化范围内
  # Spring Boot 通过 application.yml 中 localhost:3306 直连本地 MySQL
  # ============================================================

volumes:
  redis-data:
